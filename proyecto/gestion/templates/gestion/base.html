<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --page-bg: #f4f8f2;
            --surface: #ffffff;
            --surface-soft: #eef7f0;
            --text-main: #1d2f23;
            --text-muted: #66766b;
            --accent: #198754;
            --accent-dark: #146c43;
            --accent-blue: #0d6efd;
            --shadow-soft: 0 18px 45px rgba(21, 47, 31, 0.10);
            --radius-xl: 28px;
            --radius-lg: 20px;
        }

        body {
            min-height: 100vh;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(25, 135, 84, 0.12), transparent 28%),
                linear-gradient(180deg, #fbfdfb 0%, var(--page-bg) 100%);
        }

        .app-shell {
            padding-bottom: 3rem;
        }

        .site-navbar {
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(25, 135, 84, 0.10);
            border-radius: 999px;
            box-shadow: 0 10px 30px rgba(21, 47, 31, 0.08);
        }

        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), #51c288);
            color: #fff;
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(25, 135, 84, 0.24);
        }

        .navbar-brand {
            color: var(--text-main);
            font-weight: 700;
        }

        .navbar-brand:hover,
        .nav-link:hover,
        .nav-link:focus {
            color: var(--accent-blue);
        }

        .nav-link {
            color: var(--text-main);
            font-weight: 600;
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #33a36e);
            border: none;
            color: #fff;
            border-radius: 999px;
            padding: 0.8rem 1.3rem;
            font-weight: 700;
            box-shadow: 0 12px 24px rgba(25, 135, 84, 0.22);
        }

        .btn-accent:hover {
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: #fff;
        }

        .page-content {
            margin-top: 2rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid rgba(25, 135, 84, 0.10);
            box-shadow: var(--shadow-soft);
            border-radius: var(--radius-xl);
        }

        @media (max-width: 991px) {
            .site-navbar {
                border-radius: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="container app-shell">
        <nav class="navbar navbar-expand-lg site-navbar px-4 py-3">
            <div class="container-fluid px-0">
                <a class="navbar-brand d-flex align-items-center gap-3" href="{% url 'home' %}">
                    <span class="brand-badge">L</span>
                    <span>Gestion de Libros</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Mostrar navegacion">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'libro-list' %}">Libros</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-accent ms-lg-3 mt-3 mt-lg-0" href="{% url 'libro-create' %}">Crear libro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
