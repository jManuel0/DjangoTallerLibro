{% extends 'gestion/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h2 class="mb-0">Funcion: Eliminar libro</h2>
            </div>
            <div class="card-body">
                <p>Estas seguro de eliminar el libro <strong>{{ libro.titulo }}</strong>?</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Confirmar eliminacion</button>
                        <a href="{% url 'lista_libros' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
