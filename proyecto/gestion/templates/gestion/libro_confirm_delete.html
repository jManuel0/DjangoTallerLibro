{% extends 'gestion/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading">⚠️ Confirmar Eliminación</h4>
            <p>¿Está seguro de que desea eliminar el siguiente libro?</p>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">{{ libro.titulo }}</h5>
                <p class="card-text">
                    <strong>Autor:</strong> {{ libro.autor }}<br>
                    <strong>ISBN:</strong> {{ libro.isbn }}<br>
                    <strong>Cantidad:</strong> {{ libro.cantidad }}
                </p>
            </div>
        </div>

        <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-lg">🗑️ Sí, eliminar</button>
            <a href="{% url 'libro-list' %}" class="btn btn-secondary btn-lg">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
